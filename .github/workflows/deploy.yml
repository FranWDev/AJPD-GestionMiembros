name: Production Release Pipeline (Scan, Build & Deploy)

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Scan, Test & Build Native Application
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm-community'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'
          cache: 'maven'

      - name: Run SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          mvn clean compile org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.projectKey=AJPD-GestionMiembros \
            -Dsonar.projectName="AJPD-GestionMiembros" \
            -Dsonar.qualitygate.wait=true

      - name: Install UPX
        run: |
          sudo apt-get install -y --no-install-recommends upx-ucl

      - name: Run Native Integration Tests
        run: |
          mvn -Pnative native:test

      - name: Build Native Binary (Production)
        run: |
          mvn -Pnative package -DskipTests -Dspring-boot.native.build-args="-march=x86-64 -O2 -J-Xmx6g"

      - name: Compress Binary with UPX
        run: upx target/gestion

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image locally
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.native-simple
          load: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/gestion-native:latest
            ${{ secrets.DOCKER_USERNAME }}/gestion-native:${{ github.sha }}

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/gestion-native:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/gestion-native:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/gestion-native:${{ github.sha }}
